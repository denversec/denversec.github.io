name: Generate ICS Calendar

on:
  # Run on the 1st of every month at 9am UTC (catches upcoming 3rd Wednesday)
  schedule:
    - cron: '0 9 1 * *'
  # Also run on every push (so manual edits to cancelled_months.txt take effect)
  push:
    branches:
      - main
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate events.ics
        run: python generate_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Densec_events.ics feed.xml
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: auto-update events.ics [skip ci]"
          git push
